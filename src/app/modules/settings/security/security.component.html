<app-page-header title="Security" subtitle="Update password and account settings">
  <button mat-stroked-button routerLink="/settings"><mat-icon>arrow_back</mat-icon>Back</button>
</app-page-header>

<mat-card class="surface panel">
  <mat-card-title>Change password</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" class="form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Old password</mat-label>
        <input matInput type="password" formControlName="oldPassword" autocomplete="current-password" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>New password</mat-label>
        <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
        <mat-hint>Minimum 8 characters</mat-hint>
      </mat-form-field>

      <button mat-raised-button color="primary" type="button" (click)="save()" [disabled]="form.invalid || loading">
        <mat-icon>save</mat-icon>Update
      </button>
    </form>
  </mat-card-content>
</mat-card>

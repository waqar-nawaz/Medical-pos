<div class="wrap">
  <mat-card class="card surface" role="region" aria-label="Registration form">
    <mat-card-header>
      <mat-card-title>Create account</mat-card-title>
      <mat-card-subtitle>Cashier accounts can be created here</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Full name</mat-label>
          <input matInput formControlName="name" autocomplete="name" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" autocomplete="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password" required />
          <mat-hint>Minimum 8 characters</mat-hint>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full" [disabled]="loading || form.invalid">
          <mat-icon>person_add</mat-icon>
          <span>Create</span>
        </button>
      </form>

      <div class="row">
        <a routerLink="/auth/login">Back to login</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>

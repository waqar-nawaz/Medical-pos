<!-- <app-page-header title="Purchase Orders" subtitle="Create purchase orders and receive stock"></app-page-header> -->
<app-page-header title="Purchase Orders" subtitle="Create purchase orders and receive stock">
  <button mat-raised-button color="primary" (click)="openModal()">
    <mat-icon>add</mat-icon>
    Add Purchase Orders
  </button>
</app-page-header>


<mat-card class="surface panel">
  <mat-card-content>
    <div class="tableWrap" *ngIf="rows.length; else empty">
      <table mat-table [dataSource]="rows" class="mat-elevation-z0">
        <ng-container matColumnDef="poNo">
          <th mat-header-cell *matHeaderCellDef>PO</th>
          <td mat-cell *matCellDef="let r"><b>{{ r.poNo }}</b></td>
        </ng-container>
        <ng-container matColumnDef="supplier">
          <th mat-header-cell *matHeaderCellDef>Supplier</th>
          <td mat-cell *matCellDef="let r">{{ r.supplierName || '-' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let r">{{ r.status }}</td>
        </ng-container>
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let r">{{ r.createdAt | date:'medium' }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef align="right"> </th>
          <td mat-cell *matCellDef="let r" align="right">
            <button mat-stroked-button *ngIf="r.status !== 'RECEIVED'"
              (click)="receive(r)"><mat-icon>inventory</mat-icon>Receive</button>
            <span class="muted" *ngIf="r.status === 'RECEIVED'">Done</span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['poNo','supplier','status','createdAt','actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['poNo','supplier','status','createdAt','actions'];"></tr>
      </table>
    </div>

    <ng-template #empty>
      <app-empty-state icon="🛒" title="No purchase orders yet"
        description="Create a PO to receive stock updates."></app-empty-state>
    </ng-template>
  </mat-card-content>
</mat-card>


<!-- Add/Edit Supplier Modal -->
<ng-template #supplierDialog>
  <mat-card class="surface panel">
    <h2 mat-dialog-title>
      <mat-icon>{{'add_business'}}</mat-icon>
      Create purchase order
    </h2>
    <mat-dialog-content>
      <mat-card-content>
        <form [formGroup]="form" class="form">
          <mat-form-field appearance="outline" class="full">
            <mat-label>Supplier</mat-label>
            <mat-select formControlName="supplierId">
              <mat-option *ngFor="let s of suppliers" [value]="s.id">{{ s.name }}</mat-option>
            </mat-select>
          </mat-form-field>
        </form>

        <div class="lines">
          <div class="line" *ngFor="let ln of lines; let i = index">
            <mat-form-field appearance="outline" class="grow">
              <mat-label>Product</mat-label>
              <mat-select [(ngModel)]="ln.productId" name="p{{i}}">
                <mat-option *ngFor="let p of products" [value]="p.id">{{ p.name }}</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" style="width:110px">
              <mat-label>Qty</mat-label>
              <input matInput type="number" min="1" [(ngModel)]="ln.qty" name="q{{i}}" />
            </mat-form-field>

            <mat-form-field appearance="outline" style="width:140px">
              <mat-label>Cost</mat-label>
              <input matInput type="number" min="0" [(ngModel)]="ln.cost" name="c{{i}}" />
            </mat-form-field>

            <button mat-icon-button (click)="removeLine(i)"
              aria-label="Remove line"><mat-icon>delete</mat-icon></button>
          </div>

          <div class="actions d-flex justify-content-between">
            <button mat-stroked-button mat-dialog-close class="justify-content-start">Cancel</button>
            <div class="justify-content-end">
              <button mat-stroked-button (click)="addLine()" class="me-2"><mat-icon>add</mat-icon>Add line</button>
              <button mat-raised-button color="primary" (click)="create()"><mat-icon>save</mat-icon>Create</button>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-dialog-content>
  </mat-card>
</ng-template>
